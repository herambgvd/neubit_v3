# Neubit v3 — local development stack.
# Base tier: gateway (Traefik) · postgres · redis · core (Python/edge) · frontend.
# nvr / realtime / admin-frontend / domain services are added as they are built.

name: neubit-v3

networks:
  neubit:
    name: neubit

volumes:
  pgdata:

services:

  # ── edge gateway ────────────────────────────────────────────────
  gateway:
    image: traefik:v3.1
    command: ["--configFile=/etc/traefik/traefik.yml"]
    ports: ["80:80", "8090:8080"]              # 8090 = dashboard (dev)
    volumes:
      - ../gateway/traefik.yml:/etc/traefik/traefik.yml:ro
      - ../gateway/dynamic:/etc/traefik/dynamic:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [neubit]

  # ── data ────────────────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:2.17.2-pg16
    env_file: .env
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Creates neubit_ingest + neubit_workflow — but ONLY on a fresh volume
      # (Postgres runs initdb scripts on first init only). On an existing volume
      # create them manually (see deploy/postgres/init-service-dbs.sh header).
      - ./postgres/init-service-dbs.sh:/docker-entrypoint-initdb.d/10-init-service-dbs.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 3s
      retries: 15
    networks: [neubit]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [neubit]

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-sd", "/data"]
    ports: ["4222:4222", "8222:8222"]
    networks: [neubit]

  # ── infra-control sidecar (privileged) ──────────────────────────
  # The ONLY service that mounts the docker socket. NO host port, NO traefik
  # labels — reachable only on the internal `neubit` network, and only from
  # `core`, which authenticates every call with X-Ops-Token. Never mount the
  # docker socket into core.
  ops-agent:
    build: ../backend/ops-agent
    environment:
      OPS_AGENT_TOKEN: ${OPS_AGENT_TOKEN}
      COMPOSE_PROJECT: neubit-v3
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks: [neubit]
    restart: unless-stopped

  # ── platform core (Python / edge) ───────────────────────────────
  core:
    build: ../backend/core
    env_file: .env
    environment:
      # Reach the privileged infra sidecar over the internal network (see ops-agent).
      OPS_AGENT_URL: ${OPS_AGENT_URL}
      OPS_AGENT_TOKEN: ${OPS_AGENT_TOKEN}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      nats: { condition: service_started }
    ports: ["8000:8000"]
    command: >
      bash -c "alembic upgrade head &&
               uvicorn app.main:app --host 0.0.0.0 --port 8000"
    networks: [neubit]
    labels:
      - traefik.enable=true
      - traefik.http.routers.core.rule=PathPrefix(`/api`) || PathPrefix(`/health`) || PathPrefix(`/metrics`) || PathPrefix(`/files`)
      - traefik.http.routers.core.entrypoints=web
      - traefik.http.services.core.loadbalancer.server.port=8000

  # ── ingest service (Python / neubit_common) ─────────────────────
  # External webhooks / event ingestion. Owns its own DB (neubit_ingest).
  # Authorizes core-minted JWTs locally; cross-domain via NATS.
  ingest:
    build:
      context: ../backend
      dockerfile: ingest/Dockerfile
    env_file: .env
    environment:
      VE_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/neubit_ingest
    depends_on:
      postgres: { condition: service_healthy }
      nats: { condition: service_started }
    command: >
      bash -c "alembic upgrade head &&
               uvicorn app.main:app --host 0.0.0.0 --port 8000"
    networks: [neubit]

  # ── workflow service (Python / neubit_common) ───────────────────
  # SOP / automation engine. Owns its own DB (neubit_workflow). API + a Celery
  # worker + beat (three containers sharing one image).
  workflow:
    build:
      context: ../backend
      dockerfile: workflow/Dockerfile
    env_file: .env
    environment:
      VE_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/neubit_workflow
      # Host the NATS→incident correlation consumer in this API process (v1 simple).
      VE_WORKFLOW_INLINE_CORRELATION: "1"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      nats: { condition: service_started }
    command: >
      bash -c "alembic upgrade head &&
               uvicorn app.main:app --host 0.0.0.0 --port 8000"
    networks: [neubit]

  workflow-worker:
    build:
      context: ../backend
      dockerfile: workflow/Dockerfile
    env_file: .env
    environment:
      VE_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/neubit_workflow
    depends_on:
      redis: { condition: service_healthy }
      workflow: { condition: service_started }
    command: ["celery", "-A", "app.worker.celery_app", "worker", "--loglevel=info"]
    networks: [neubit]

  workflow-beat:
    build:
      context: ../backend
      dockerfile: workflow/Dockerfile
    env_file: .env
    environment:
      VE_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/neubit_workflow
    depends_on:
      redis: { condition: service_healthy }
      workflow: { condition: service_started }
    command: ["celery", "-A", "app.worker.celery_app", "beat", "--loglevel=info"]
    networks: [neubit]

  # ── operator console (Next.js) ──────────────────────────────────
  frontend:
    build: ../frontend
    env_file: .env
    depends_on: [core]
    ports: ["3000:3000"]
    # Bind-mount source for hot reload (WATCHPACK_POLLING handles Docker Desktop mac).
    # Anonymous volumes keep the container's linux node_modules + .next build cache.
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.next
    networks: [neubit]
    labels:
      - traefik.enable=true
      - traefik.http.routers.web.rule=PathPrefix(`/`)
      - traefik.http.routers.web.entrypoints=web
      - traefik.http.services.web.loadbalancer.server.port=3000

  # ── super-admin panel (separate app) ────────────────────────────
  admin-frontend:
    build: ../admin-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost
    depends_on: [core]
    volumes:
      - ../admin-frontend:/app
      - /app/node_modules
      - /app/.next
    networks: [neubit]
