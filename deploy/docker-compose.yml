# Neubit v3 — local development stack.
# Base tier: gateway (Traefik) · postgres · redis · core (Python/edge) · frontend.
# nvr / realtime / admin-frontend / domain services are added as they are built.

name: neubit-v3

networks:
  neubit:
    name: neubit

volumes:
  pgdata:
  # Shared recording store (P3-A): MediaMTX writes fmp4 segments here; the Go nvr
  # scans it (segment tracker) + owns retention. Both containers mount it at
  # /recordings so the on-disk path (cameras/<tenant>/<cam>/<profile>/<seg>.mp4) is
  # identical on both sides.
  recordings:
  # P3-B: MinIO object data (the dev S3 cold tier the tiering worker writes to).
  miniodata:

services:

  # ── edge gateway ────────────────────────────────────────────────
  gateway:
    image: traefik:v3.1
    command: ["--configFile=/etc/traefik/traefik.yml"]
    ports: ["80:80", "8090:8080"]              # 8090 = dashboard (dev)
    volumes:
      - ../gateway/traefik.yml:/etc/traefik/traefik.yml:ro
      - ../gateway/dynamic:/etc/traefik/dynamic:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [neubit]

  # ── data ────────────────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:2.17.2-pg16
    env_file: .env
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Creates neubit_ingest + neubit_workflow — but ONLY on a fresh volume
      # (Postgres runs initdb scripts on first init only). On an existing volume
      # create them manually (see deploy/postgres/init-service-dbs.sh header).
      - ./postgres/init-service-dbs.sh:/docker-entrypoint-initdb.d/10-init-service-dbs.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 3s
      retries: 15
    networks: [neubit]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [neubit]

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-sd", "/data"]
    ports: ["4222:4222", "8222:8222"]
    networks: [neubit]

  # ── infra-control sidecar (privileged) ──────────────────────────
  # The ONLY service that mounts the docker socket. NO host port, NO traefik
  # labels — reachable only on the internal `neubit` network, and only from
  # `core`, which authenticates every call with X-Ops-Token. Never mount the
  # docker socket into core.
  ops-agent:
    build: ../backend/ops-agent
    environment:
      OPS_AGENT_TOKEN: ${OPS_AGENT_TOKEN}
      COMPOSE_PROJECT: neubit-v3
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks: [neubit]
    restart: unless-stopped

  # ── platform core (Python / edge) ───────────────────────────────
  core:
    build: ../backend/core
    env_file: .env
    environment:
      # Reach the privileged infra sidecar over the internal network (see ops-agent).
      OPS_AGENT_URL: ${OPS_AGENT_URL}
      OPS_AGENT_TOKEN: ${OPS_AGENT_TOKEN}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      nats: { condition: service_started }
    ports: ["8000:8000"]
    # The 0001 baseline builds the full current schema from the ORM metadata
    # (create_all), so the later incremental deltas (0002-0010) would collide on a
    # fresh DB. Create the baseline schema, then stamp head to record the deltas as
    # applied. (Existing DBs upgrading from an older schema are out of scope here.)
    command: >
      bash -c "alembic upgrade 0001 &&
               alembic stamp head &&
               uvicorn app.main:app --host 0.0.0.0 --port 8000"
    networks: [neubit]
    labels:
      - traefik.enable=true
      - traefik.http.routers.core.rule=PathPrefix(`/api`) || PathPrefix(`/health`) || PathPrefix(`/metrics`) || PathPrefix(`/files`)
      - traefik.http.routers.core.entrypoints=web
      - traefik.http.services.core.loadbalancer.server.port=8000

  # ── ingest service (Python / neubit_common) ─────────────────────
  # External webhooks / event ingestion. Owns its own DB (neubit_ingest).
  # Authorizes core-minted JWTs locally; cross-domain via NATS.
  ingest:
    build:
      context: ../backend
      dockerfile: ingest/Dockerfile
    env_file: .env
    environment:
      VE_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/neubit_ingest
    depends_on:
      postgres: { condition: service_healthy }
      nats: { condition: service_started }
    command: >
      bash -c "alembic upgrade head &&
               uvicorn app.main:app --host 0.0.0.0 --port 8000"
    networks: [neubit]

  # ── workflow service (Python / neubit_common) ───────────────────
  # SOP / automation engine. Owns its own DB (neubit_workflow). API + a Celery
  # worker + beat (three containers sharing one image).
  workflow:
    build:
      context: ../backend
      dockerfile: workflow/Dockerfile
    env_file: .env
    environment:
      VE_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/neubit_workflow
      # Host the NATS→incident correlation consumer in this API process (v1 simple).
      VE_WORKFLOW_INLINE_CORRELATION: "1"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      nats: { condition: service_started }
    command: >
      bash -c "alembic upgrade head &&
               uvicorn app.main:app --host 0.0.0.0 --port 8000"
    networks: [neubit]

  workflow-worker:
    build:
      context: ../backend
      dockerfile: workflow/Dockerfile
    env_file: .env
    environment:
      VE_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/neubit_workflow
    depends_on:
      redis: { condition: service_healthy }
      workflow: { condition: service_started }
    command: ["celery", "-A", "app.worker.celery_app", "worker", "--loglevel=info"]
    networks: [neubit]

  workflow-beat:
    build:
      context: ../backend
      dockerfile: workflow/Dockerfile
    env_file: .env
    environment:
      VE_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/neubit_workflow
    depends_on:
      redis: { condition: service_healthy }
      workflow: { condition: service_started }
    command: ["celery", "-A", "app.worker.celery_app", "beat", "--loglevel=info"]
    networks: [neubit]

  # ── access-control (gates) service (Python / neubit kernel) ─────
  # Registers access controllers (DDS via OData + SignalR), mirrors their
  # entities, and ingests real-time access events onto the NATS spine
  # (tenant.<id>.access.<category>.<type>) for workflow correlation. Owns its own
  # DB (neubit_access). Authorizes core-minted JWTs locally; cross-domain via NATS.
  access:
    build:
      context: ../backend
      dockerfile: access/Dockerfile
    env_file: .env
    environment:
      VE_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/neubit_access
    depends_on:
      postgres: { condition: service_healthy }
      nats: { condition: service_started }
    command: >
      bash -c "alembic upgrade head &&
               uvicorn app.main:app --host 0.0.0.0 --port 8000"
    networks: [neubit]

  # ── vision — VMS control-plane (Python / neubit kernel) ─────────
  # Camera + NVR master records, ONVIF onboarding/discovery, multi-brand drivers,
  # config, per-camera ACL, health aggregation. Owns its own DB (neubit_vision).
  # Reuses core RBAC (verifies core-minted JWTs locally); interoperates with the Go
  # `nvr` data-plane over NATS + REST. Emits tenant.<id>.vms.* + device.camera.*.
  vision:
    build:
      context: ../backend
      dockerfile: vision/Dockerfile
    env_file: .env
    environment:
      VE_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/neubit_vision
      # P2-B live streaming: where vision reaches the Go nvr data-plane (internal
      # docker DNS) + the media-token TTL (browser HLS/WHEP token; renewable).
      VE_NVR_URL: ${VE_NVR_URL:-http://nvr:8000}
      VE_MEDIA_TOKEN_TTL_SEC: ${VE_MEDIA_TOKEN_TTL_SEC:-300}
      # P3-B storage — where the recording segments are mounted (same volume MediaMTX
      # writes to + nvr scans), the retention/tiering sweep interval, and the global
      # retention fallback used when a camera has no explicit retention_days.
      VE_RECORDINGS_DIR: ${VE_RECORDINGS_DIR:-/recordings}
      VE_RETENTION_TICK_SEC: ${VE_RETENTION_TICK_SEC:-300}
      VE_DEFAULT_RETENTION_DAYS: ${VE_DEFAULT_RETENTION_DAYS:-30}
      # P4-B clip export: the export worker ffmpeg-concats recorded fmp4 segments into
      # a single mp4 written under the downloads area (a subdir of the recordings
      # volume by default → same mount). Tune the poll interval + concurrency.
      VE_DOWNLOADS_DIR: ${VE_DOWNLOADS_DIR:-/recordings/downloads}
      VE_EXPORT_TICK_SEC: ${VE_EXPORT_TICK_SEC:-5}
      VE_EXPORT_CONCURRENCY: ${VE_EXPORT_CONCURRENCY:-2}
    depends_on:
      postgres: { condition: service_healthy }
      nats: { condition: service_started }
    volumes:
      # P3-B: mount the shared recordings volume so vision can CHECKSUM segments
      # (read) and the retention/tiering worker can DELETE + COPY them (write) — same
      # /recordings path as mediamtx + nvr so the on-disk paths match.
      - recordings:/recordings
    command: >
      bash -c "alembic upgrade head &&
               uvicorn app.main:app --host 0.0.0.0 --port 8000"
    networks: [neubit]

  # ── minio — dev S3 cold tier (P3-B) ─────────────────────────────
  # An S3-compatible object store so the S3 storage pool + local→cold tiering are
  # testable in dev. Create an S3 pool in vision pointing at http://minio:9000 with
  # these credentials; vision ensure_bucket()s the bucket on pool create. Console on
  # :9001, S3 API on :9000 (both host-published for local inspection).
  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [neubit]

  # ── mediamtx — VMS media node (P2-A) ────────────────────────────
  # The live-video data plane. The Go `nvr` service adds/patches/deletes paths at
  # runtime via the control API on :9997 (each path's `source` = a camera RTSP
  # URL; MediaMTX pulls on demand). Browsers play HLS (:8888) / WebRTC-WHEP
  # (:8889). The :9997 control API is INTERNAL — reachable only inside the neubit
  # network by nvr, NEVER routed through the public Traefik gateway. Public
  # HLS/WebRTC token-auth is added at the Traefik ForwardAuth layer in P2-C.
  mediamtx:
    image: bluenviron/mediamtx:latest
    restart: unless-stopped
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
      # P3-A: MediaMTX native recording writes fmp4 segments here (record=yes on a
      # path → /recordings/<path>/<timestamp>.mp4). The nvr mounts the same volume.
      - recordings:/recordings
    ports:
      - "8554:8554"     # RTSP
      - "1935:1935"     # RTMP (ingest for synthetic test sources)
      - "8888:8888"     # HLS
      - "8889:8889"     # WebRTC HTTP signaling (WHEP)
      - "8189:8189/udp" # WebRTC ICE (UDP)
      - "8189:8189/tcp" # WebRTC ICE (TCP)
      # NOTE: 9997 (control API) + 9996 (P4-A playback server) are deliberately NOT
      # published to the host — they are reachable only on the internal `neubit`
      # network (9997 by nvr; 9996 by nvr for /list + by the gateway for /get, which
      # routes it token-gated under /media/playback). Never routed publicly directly.
    networks: [neubit]

  # ── nvr — VMS data-plane (Go / gokernel) ────────────────────────
  # FIRST Go service in the stack. Recording/streaming engine (P2–P3). P2-A owns
  # the live-stream orchestration: a MediaMTX client + a stream-supervisor that
  # shards cameras across MediaMTX node(s) and exposes internal /streams/ensure|
  # DELETE|list endpoints (called service-to-service by `vision`). Own DB
  # (neubit_nvr) + migrations. Built on the shared Go kernel so it shares the SAME
  # JWT + NATS envelope + error contract as the Python services.
  nvr:
    build:
      context: ../backend
      dockerfile: nvr/Dockerfile
    env_file: .env
    environment:
      VE_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/neubit_nvr
      VE_APP_NAME: nvr
      VE_PORT: "8000"
      # MediaMTX wiring. VE_MEDIAMTX_API_URL is the INTERNAL control API (docker
      # DNS). The public base URLs are host-reachable (browser-facing) and are
      # returned to callers in ensure responses.
      VE_MEDIAMTX_API_URL: ${VE_MEDIAMTX_API_URL:-http://mediamtx:9997}
      # Public browser-facing bases route through the Traefik GATEWAY (P2-C), so
      # HLS/WHEP playback is token-gated by the media-auth ForwardAuth → vision
      # /media/verify. These become the hls_url/webrtc_url returned to callers.
      # (Gateway is on :80, so no port in the base.)
      VE_MEDIA_PUBLIC_HLS_BASE: ${VE_MEDIA_PUBLIC_HLS_BASE:-http://localhost/media/hls}
      VE_MEDIA_PUBLIC_WHEP_BASE: ${VE_MEDIA_PUBLIC_WHEP_BASE:-http://localhost/media/whep}
      VE_MEDIAMTX_RTSP_BASE: ${VE_MEDIAMTX_RTSP_BASE:-rtsp://localhost:8554}
      # P4-A recorded playback. VE_MEDIAMTX_PLAYBACK_API_URL is the INTERNAL MediaMTX
      # playback server (nvr queries /list here). VE_MEDIA_PUBLIC_PLAYBACK_BASE is the
      # browser-facing base the /get URL is built from — the Traefik GATEWAY prefix,
      # so recorded fmp4 playback is token-gated by the media-auth ForwardAuth.
      VE_MEDIAMTX_PLAYBACK_API_URL: ${VE_MEDIAMTX_PLAYBACK_API_URL:-http://mediamtx:9996}
      VE_MEDIA_PUBLIC_PLAYBACK_BASE: ${VE_MEDIA_PUBLIC_PLAYBACK_BASE:-http://localhost/media/playback}
      # The nvr's own MediaMTX node id (the supervisor registers this on boot).
      VE_MEDIA_NODE_ID: ${VE_MEDIA_NODE_ID:-mediamtx-0}
      # Idle-path reaper: delete paths with 0 readers idle for this many seconds.
      VE_STREAM_IDLE_TTL_SEC: ${VE_STREAM_IDLE_TTL_SEC:-300}
      # P3-A recording: the mounted recordings dir the segment-tracker scans (same
      # volume MediaMTX writes to), the MediaMTX record segment length, and the
      # reconcile + segment-scan tick.
      VE_RECORDINGS_DIR: ${VE_RECORDINGS_DIR:-/recordings}
      VE_RECORD_SEGMENT_DURATION: ${VE_RECORD_SEGMENT_DURATION:-60s}
      VE_RECORD_TICK_SEC: ${VE_RECORD_TICK_SEC:-15}
    volumes:
      # Same recordings volume as MediaMTX (read the segments it writes).
      - recordings:/recordings
    depends_on:
      postgres: { condition: service_healthy }
      nats: { condition: service_started }
      mediamtx: { condition: service_started }
    networks: [neubit]

  # ── operator console (Next.js) ──────────────────────────────────
  frontend:
    build: ../frontend
    env_file: .env
    depends_on: [core]
    ports: ["3000:3000"]
    # Bind-mount source for hot reload (WATCHPACK_POLLING handles Docker Desktop mac).
    # Anonymous volumes keep the container's linux node_modules + .next build cache.
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.next
    networks: [neubit]
    labels:
      - traefik.enable=true
      - traefik.http.routers.web.rule=PathPrefix(`/`)
      - traefik.http.routers.web.entrypoints=web
      - traefik.http.services.web.loadbalancer.server.port=3000

  # ── super-admin panel (separate app) ────────────────────────────
  admin-frontend:
    build: ../admin-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost
    depends_on: [core]
    volumes:
      - ../admin-frontend:/app
      - /app/node_modules
      - /app/.next
    networks: [neubit]
