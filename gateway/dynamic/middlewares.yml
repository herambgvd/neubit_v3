# Dynamic config: shared middlewares. Route→service mapping is via Docker labels on each
# service (see deploy/docker-compose.yml), so adding a service needs no gateway edit.

http:
  middlewares:

    # Every protected route runs ForwardAuth to the core service. core validates the JWT
    # (issuer/audience pinned, HS256/EdDSA), resolves the tenant, and returns identity
    # headers that Traefik injects downstream. Services trust these headers only.
    forward-auth:
      forwardAuth:
        address: "http://core:8000/internal/auth/verify"
        authResponseHeaders:
          - X-User-Id
          - X-User-Role
          - X-Tenant-Id
          - X-Permissions

    # Strip any client-supplied identity headers before auth injects the trusted ones.
    strip-identity:
      headers:
        customRequestHeaders:
          X-User-Id: ""
          X-User-Role: ""
          X-Tenant-Id: ""
          X-Permissions: ""

    sec-headers:
      headers:
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        contentTypeNosniff: true
        frameDeny: true
        referrerPolicy: strict-origin-when-cross-origin

    rate-limit:
      rateLimit:
        average: 100
        burst: 200

    # Chain for the SATELLITE services (workflow/access/vision/nvr/ingest). Strips any
    # client identity headers, then forward-auth injects the trusted X-Tenant-Id/etc.
    # from a valid token (it never rejects — public sub-paths like the ingest webhook
    # still pass; the kernel cross-checks the injected header against the JWT).
    api-protected:
      chain:
        middlewares:
          - strip-identity
          - forward-auth
          - sec-headers
          - rate-limit

    # Chain for CORE itself: strip-identity + hardening, but NO forward-auth — core is
    # the auth target (avoid the self-hop + it self-verifies every request anyway), and
    # its routers mix public (login/branding) with protected paths.
    core-protected:
      chain:
        middlewares:
          - strip-identity
          - sec-headers
          - rate-limit

    # ── VMS media (P2-C) ───────────────────────────────────────────────────
    # ForwardAuth that gates public HLS/WebRTC playback. vision validates the
    # short-lived media token that the browser carries as ?token=<t> on every
    # HLS segment / WHEP request. Traefik ForwardAuth does NOT forward the query
    # string on the auth sub-request, so vision reads the token from the
    # X-Forwarded-Uri header (which Traefik always sends, incl. ?token=). A 200
    # lets the request proxy to MediaMTX; 401/403 blocks it. trustForwardHeader
    # keeps the X-Forwarded-* chain intact so vision sees the original URI.
    media-auth:
      forwardAuth:
        address: "http://vision:8000/api/v1/vms/media/verify"
        trustForwardHeader: true

    # Strip the /media/hls prefix so MediaMTX sees /<name>/index.m3u8. HLS
    # playlists reference their segments by RELATIVE path, so the browser
    # re-requests them under the SAME /media/hls prefix — which routes straight
    # back here. Keep this prefix stable.
    media-hls-strip:
      stripPrefix:
        prefixes:
          - "/media/hls"

    # Strip the /media/whep prefix so MediaMTX sees /<name>/whep.
    media-whep-strip:
      stripPrefix:
        prefixes:
          - "/media/whep"

    # Strip the /media/playback prefix so the MediaMTX playback server (:9996) sees
    # its native /get?path=… (+ /list). The playback /get serves ONE seekable fmp4
    # stream — no relative-segment playlist — so a plain stripPrefix is enough (no
    # cookieCheck rebounce like HLS needs). Token-gated by media-auth (P4-A).
    media-playback-strip:
      stripPrefix:
        prefixes:
          - "/media/playback"

    # NODE 2 (local multi-node test) — strip the /media2/* prefixes so mediamtx-2
    # sees its native paths.
    media2-hls-strip:
      stripPrefix:
        prefixes:
          - "/media2/hls"
    media2-whep-strip:
      stripPrefix:
        prefixes:
          - "/media2/whep"
    media2-playback-strip:
      stripPrefix:
        prefixes:
          - "/media2/playback"

    # MediaMTX's HLS muxer bounces the FIRST playlist request (no `cookieCheck=1`
    # query) with a 302 whose Location is ROOT-ABSOLUTE (`/<name>/index.m3u8?
    # cookieCheck=1&token=...`) — it is NOT subpath-aware and ignores
    # X-Forwarded-Prefix. A browser would follow that to `/<name>/...` (the SPA),
    # dropping the /media/hls prefix + the token gate. This middleware catches the
    # bounced request and re-prepends /media/hls so it re-enters the gated HLS
    # route (where cookieCheck=1 is now present → MediaMTX serves 200, no 2nd
    # bounce). It fires ONLY on the tightly-scoped bounce router below.
    media-hls-rebounce:
      redirectRegex:
        regex: "^https?://[^/]+/(.*)$"
        replacement: "/media/hls/${1}"
