# File-provider routing for the base stack. Services reachable by container name on the
# `neubit` network. Add a router+service block here as each new service comes online.

http:
  routers:
    # Priorities are explicit so host + path rules resolve deterministically
    # (Traefik's default = rule length, which mis-ranks Host vs PathPrefix here).
    # HIGHER priority wins. Core owns the broad `/api/` prefix, so the satellite
    # services must sit ABOVE it (110 > 100) to peel off their more-specific
    # prefixes; everything else under `/api/` still falls through to core.
    #   ingest/workflow/access (110) — /api/v1/{ingest,workflow,access} (+ /ingest) FIRST
    #   core       (100)      — /api/|/health|/metrics|/files ALWAYS win otherwise
    #   admin      (50)       — the admin.localhost host, for what core didn't claim
    #   frontend   (1)        — catch-all operator console (localhost + any host)
    ingest:
      # The versioned config API + ONLY the public webhook receiver (/ingest/hooks).
      # A bare /ingest prefix would swallow the operator UI's /ingest page → keep it narrow.
      rule: "PathPrefix(`/api/v1/ingest`) || PathPrefix(`/ingest/hooks`)"
      service: ingest
      entryPoints: [web]
      priority: 110
      middlewares: [api-protected]
    workflow:
      rule: "PathPrefix(`/api/v1/workflow`)"
      service: workflow
      entryPoints: [web]
      priority: 110
      middlewares: [api-protected]
    access:
      # Access-control API — instance CRUD + reconcile + mirror reads under /api/v1/access.
      rule: "PathPrefix(`/api/v1/access`)"
      service: access
      entryPoints: [web]
      priority: 110
      middlewares: [api-protected]
    vision:
      # VMS control-plane — cameras/NVR/discovery/config/health under /api/v1/vms.
      rule: "PathPrefix(`/api/v1/vms`)"
      service: vision
      entryPoints: [web]
      priority: 110
      middlewares: [api-protected]
    nvr:
      # VMS data-plane (Go) — data-plane status/ops under /api/v1/nvr.
      rule: "PathPrefix(`/api/v1/nvr`)"
      service: nvr
      entryPoints: [web]
      priority: 110
      middlewares: [api-protected]
    onvif-server:
      # P6-C ONVIF server — OUR VMS answering as an ONVIF device so external
      # VMS/recorders (Milestone/Genetec/NVRs) discover + pull our streams/recordings.
      # The SOAP endpoints live at the vision service ROOT (/onvif/*), authenticated by
      # WS-Security UsernameToken (NOT the kernel JWT). Priority 110 so it peels off
      # /onvif before the SPA catch-all.
      rule: "PathPrefix(`/onvif`)"
      service: vision
      entryPoints: [web]
      priority: 110
    # ── VMS public media (P2-C) ────────────────────────────────────────────
    # Browser-facing HLS + WebRTC/WHEP proxied to the MediaMTX node, token-gated
    # by the media-auth ForwardAuth (→ vision /media/verify). Priority 110 so
    # they win over the SPA catch-all (like the /api routes). The prefix is
    # stripped so MediaMTX sees its native /<name>/index.m3u8 + /<name>/whep.
    # The MediaMTX control API (:9997) is NOT routed here — it stays internal.
    media-hls:
      rule: "PathPrefix(`/media/hls`)"
      service: mediamtx-hls
      entryPoints: [web]
      priority: 110
      middlewares:
        - media-auth
        - media-hls-strip
    media-whep:
      rule: "PathPrefix(`/media/whep`)"
      service: mediamtx-whep
      entryPoints: [web]
      priority: 110
      middlewares:
        - media-auth
        - media-whep-strip
    # ── VMS recorded playback (P4-A) ───────────────────────────────────────
    # Browser-facing recorded-fmp4 playback proxied to the MediaMTX PLAYBACK
    # server (:9996), token-gated by the SAME media-auth ForwardAuth as live. The
    # /media/playback prefix is stripped so MediaMTX sees its native /get?path=…
    # (and /list). The playback server serves a single seekable fmp4 stream (no
    # relative-segment playlist), so a plain stripPrefix suffices — no rebounce.
    media-playback:
      rule: "PathPrefix(`/media/playback`)"
      service: mediamtx-playback
      entryPoints: [web]
      priority: 110
      middlewares:
        - media-auth
        - media-playback-strip
    # Catches MediaMTX's root-absolute HLS cookieCheck bounce (see
    # media-hls-rebounce) and 302s it back under /media/hls. Scoped as tightly as
    # possible: a `.m3u8` path carrying `?cookieCheck=1`, and NOT already prefixed.
    # Priority 105 so it beats the SPA catch-all but sits below the real media
    # routes. `service` is required by Traefik even though the middleware always
    # redirects before hitting it — point it at the HLS backend as a safe no-op.
    media-hls-rebounce:
      rule: "PathRegexp(`\\.m3u8$`) && Query(`cookieCheck`, `1`) && !PathPrefix(`/media/`)"
      service: mediamtx-hls
      entryPoints: [web]
      priority: 105
      middlewares:
        - media-hls-rebounce
    core:
      # NOTE: `/api/` (trailing slash) — a bare `/api` prefix also swallows frontend
      # routes like `/api-keys`. Backend endpoints are all under `/api/v1/...`.
      rule: "PathPrefix(`/api/`) || PathPrefix(`/health`) || PathPrefix(`/metrics`) || PathPrefix(`/files`)"
      service: core
      entryPoints: [web]
      priority: 100
      middlewares: [core-protected]
    admin:
      rule: "Host(`admin.localhost`)"
      service: admin-frontend
      entryPoints: [web]
      priority: 50
    frontend:
      rule: "PathPrefix(`/`)"
      service: frontend
      entryPoints: [web]
      priority: 1              # lowest — everything not matched above falls here

  services:
    core:
      loadBalancer:
        servers:
          - url: "http://core:8000"
    ingest:
      loadBalancer:
        servers:
          - url: "http://ingest:8000"
    workflow:
      loadBalancer:
        servers:
          - url: "http://workflow:8000"
    access:
      loadBalancer:
        servers:
          - url: "http://access:8000"
    vision:
      loadBalancer:
        servers:
          - url: "http://vision:8000"
    nvr:
      loadBalancer:
        servers:
          - url: "http://nvr:8000"
    # MediaMTX public listeners (control API :9997 stays internal, never routed).
    mediamtx-hls:
      loadBalancer:
        servers:
          - url: "http://mediamtx:8888"
    mediamtx-whep:
      loadBalancer:
        servers:
          - url: "http://mediamtx:8889"
    # MediaMTX recorded-playback server (P4-A). Internal :9996, routed only through
    # the gateway under /media/playback (token-gated); never published to the host.
    mediamtx-playback:
      loadBalancer:
        servers:
          - url: "http://mediamtx:9996"
    frontend:
      loadBalancer:
        servers:
          - url: "http://frontend:3000"
    admin-frontend:
      loadBalancer:
        servers:
          - url: "http://admin-frontend:3000"
