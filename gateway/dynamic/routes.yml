# File-provider routing for the base stack. Services reachable by container name on the
# `neubit` network. Add a router+service block here as each new service comes online.

http:
  routers:
    # Priorities are explicit so host + path rules resolve deterministically
    # (Traefik's default = rule length, which mis-ranks Host vs PathPrefix here).
    # HIGHER priority wins. Core owns the broad `/api/` prefix, so the satellite
    # services must sit ABOVE it (110 > 100) to peel off their more-specific
    # prefixes; everything else under `/api/` still falls through to core.
    #   ingest/workflow/access (110) — /api/v1/{ingest,workflow,access} (+ /ingest) FIRST
    #   core       (100)      — /api/|/health|/metrics|/files ALWAYS win otherwise
    #   admin      (50)       — the admin.localhost host, for what core didn't claim
    #   frontend   (1)        — catch-all operator console (localhost + any host)
    ingest:
      # The versioned config API + ONLY the public webhook receiver (/ingest/hooks).
      # A bare /ingest prefix would swallow the operator UI's /ingest page → keep it narrow.
      rule: "PathPrefix(`/api/v1/ingest`) || PathPrefix(`/ingest/hooks`)"
      service: ingest
      entryPoints: [web]
      priority: 110
    workflow:
      rule: "PathPrefix(`/api/v1/workflow`)"
      service: workflow
      entryPoints: [web]
      priority: 110
    access:
      # Access-control API — instance CRUD + reconcile + mirror reads under /api/v1/access.
      rule: "PathPrefix(`/api/v1/access`)"
      service: access
      entryPoints: [web]
      priority: 110
    vision:
      # VMS control-plane — cameras/NVR/discovery/config/health under /api/v1/vms.
      rule: "PathPrefix(`/api/v1/vms`)"
      service: vision
      entryPoints: [web]
      priority: 110
    nvr:
      # VMS data-plane (Go) — data-plane status/ops under /api/v1/nvr.
      rule: "PathPrefix(`/api/v1/nvr`)"
      service: nvr
      entryPoints: [web]
      priority: 110
    core:
      # NOTE: `/api/` (trailing slash) — a bare `/api` prefix also swallows frontend
      # routes like `/api-keys`. Backend endpoints are all under `/api/v1/...`.
      rule: "PathPrefix(`/api/`) || PathPrefix(`/health`) || PathPrefix(`/metrics`) || PathPrefix(`/files`)"
      service: core
      entryPoints: [web]
      priority: 100
    admin:
      rule: "Host(`admin.localhost`)"
      service: admin-frontend
      entryPoints: [web]
      priority: 50
    frontend:
      rule: "PathPrefix(`/`)"
      service: frontend
      entryPoints: [web]
      priority: 1              # lowest — everything not matched above falls here

  services:
    core:
      loadBalancer:
        servers:
          - url: "http://core:8000"
    ingest:
      loadBalancer:
        servers:
          - url: "http://ingest:8000"
    workflow:
      loadBalancer:
        servers:
          - url: "http://workflow:8000"
    access:
      loadBalancer:
        servers:
          - url: "http://access:8000"
    vision:
      loadBalancer:
        servers:
          - url: "http://vision:8000"
    nvr:
      loadBalancer:
        servers:
          - url: "http://nvr:8000"
    frontend:
      loadBalancer:
        servers:
          - url: "http://frontend:3000"
    admin-frontend:
      loadBalancer:
        servers:
          - url: "http://admin-frontend:3000"
